<!doctype html><meta charset=utf-8><title>Vault Console</title>
<style>
  :root{--bg:#0f1220;--card:#171b2e;--line:#262c47;--txt:#e7e9f3;--mut:#8b90ad;--accent:#7c5cff;--good:#31d0aa}
  *{box-sizing:border-box}body{margin:0;font:15px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--txt)}
  header{display:flex;align-items:center;gap:12px;padding:20px 32px;border-bottom:1px solid var(--line)}
  .logo{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#4dd2ff)}
  h1{font-size:18px;margin:0;font-weight:650}
  main{padding:28px 32px;max-width:1000px}
  .bar{display:flex;gap:12px;margin-bottom:20px}
  input{flex:1;background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:12px 14px;font-size:15px}
  input:focus{outline:none;border-color:var(--accent)}
  button{background:var(--accent);color:#fff;border:0;border-radius:10px;padding:12px 18px;font-size:15px;font-weight:600;cursor:pointer}
  table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  th,td{text-align:left;padding:14px 16px;border-bottom:1px solid var(--line)}
  th{color:var(--mut);font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.04em}
  tr:last-child td{border-bottom:0}
  tbody tr{cursor:pointer}tbody tr:hover{background:#1d2238}
  .tok{font-family:ui-monospace,Menlo,monospace;color:var(--good)}
  .count{color:var(--mut);margin:0 0 14px}
  .drawer{position:fixed;top:0;right:-460px;width:440px;height:100%;background:var(--card);border-left:1px solid var(--line);padding:28px;transition:right .35s cubic-bezier(.4,0,.2,1);box-shadow:-20px 0 60px #0008}
  .drawer.open{right:0}
  .drawer h2{margin:0 0 4px;font-size:20px}.drawer .sub{color:var(--mut);margin-bottom:22px}
  .kv{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line)}
  .kv .k{color:var(--mut)}.pill{background:#31d0aa22;color:var(--good);padding:3px 10px;border-radius:20px;font-size:13px;font-weight:600}
</style>
<header><div class=logo></div><h1>Vault Console</h1></header>
<main>
  <div class=bar>
    <input id=q placeholder="Search customers by name or ID…">
    <button id=go>Search</button>
  </div>
  <p class=count id=count>142 customers</p>
  <table><thead><tr><th>Name</th><th>Customer ID</th><th>Card (tokenized)</th><th>Status</th></tr></thead>
  <tbody id=rows></tbody></table>
</main>
<div class=drawer id=drawer>
  <h2 id=dname></h2><div class=sub id=did></div>
  <div class=kv><span class=k>Card token</span><span class="tok" id=dtok></span></div>
  <div class=kv><span class=k>Email</span><span id=demail></span></div>
  <div class=kv><span class=k>Region</span><span id=dregion></span></div>
  <div class=kv><span class=k>Status</span><span class=pill>Active</span></div>
</div>
<script>
  const data=[
    {n:"Ada Lovelace",id:"cus_8f2a",tok:"tok_4c1e…9b2",email:"ada@calc.io",region:"us-east-1"},
    {n:"Alan Turing",id:"cus_1d77",tok:"tok_9a02…4f7",email:"alan@ml.dev",region:"eu-west-2"},
    {n:"Grace Hopper",id:"cus_5b90",tok:"tok_77de…0a1",email:"grace@navy.mil",region:"us-east-1"},
    {n:"Katherine Johnson",id:"cus_3e21",tok:"tok_2b55…c8d",email:"kj@nasa.gov",region:"us-west-2"},
  ];
  const rows=document.getElementById('rows'),count=document.getElementById('count');
  function render(list){rows.innerHTML='';list.forEach(r=>{const tr=document.createElement('tr');
    tr.innerHTML=`<td>${r.n}</td><td>${r.id}</td><td class=tok>${r.tok}</td><td><span class=pill>Active</span></td>`;
    tr.onclick=()=>open(r);rows.appendChild(tr);});count.textContent=list.length+' customers';}
  function search(){const t=document.getElementById('q').value.toLowerCase();
    render(data.filter(r=>r.n.toLowerCase().includes(t)||r.id.includes(t)));}
  function open(r){dname.textContent=r.n;did.textContent=r.id;dtok.textContent=r.tok;
    demail.textContent=r.email;dregion.textContent=r.region;drawer.classList.add('open');}
  document.getElementById('go').onclick=search;
  document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter')search();});
  render(data);
</script>
